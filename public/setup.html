<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifebook - Story Setup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="setup-body">

  <div class="setup-shell">
    <header class="wizard-topbar">
      <div class="wizard-topbar-left">
        <button class="back-link-button" id="backToCrop" type="button">← Back</button>
      </div>

      <div class="wizard-brand">
        <div class="logo-mark small"></div>
        <span class="wizard-brand-text">lifebook</span>
      </div>

      <div class="wizard-topbar-right"></div>
    </header>

    <main class="setup-main">
      <div class="wizard-step-label">STEP 2 OF 5</div>
      <h1 class="wizard-title">Tell us about the story</h1>
      <p class="wizard-subtitle">
        Add the child details and guide the story with a few sentences.
      </p>

      <div class="setup-card">
        <div class="setup-grid">

          <div class="setup-left">
            <div class="preview-photo-card">
              <div class="preview-photo-title">Main character photo</div>
              <img id="previewCroppedPhoto" class="preview-cropped-photo" alt="Character preview" />
            </div>
          </div>

          <div class="setup-right">
            <div class="form-group">
              <label for="childName">Child name</label>
              <input id="childName" type="text" placeholder="Enter child's name" />
            </div>

            <div class="form-row-2">
              <div class="form-group">
                <label for="childAge">Age</label>
                <select id="childAge"></select>
              </div>

              <div class="form-group">
                <label for="childGender">Gender</label>
                <select id="childGender">
                  <option value="">Select gender</option>
                  <option value="girl">Girl</option>
                  <option value="boy">Boy</option>
                  <option value="neutral">Prefer neutral</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Illustration style</label>
              <div class="style-selector-grid" id="styleSelectorGrid"></div>
            </div>

            <div class="form-group">
              <label for="storyIdea">Story direction</label>
              <textarea
                id="storyIdea"
                rows="6"
                placeholder="Write a few sentences about the kind of story you want. For example: I want a magical forest adventure where Maya finds a glowing key and learns to be brave."
              ></textarea>
              <div class="field-help">
                Tip: mention mood, setting, lesson, favorite animals, magical objects, or any theme you want.
              </div>
            </div>

            <button class="continue-btn" id="continueToStoryBtn" type="button">
              Continue
            </button>

            <div id="setupError" class="setup-error"></div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./js/setup.js"></script>
</body>
</html>
