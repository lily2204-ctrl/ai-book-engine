<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Payment Success</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-shell{
      width:min(860px, 94vw);
      margin:0 auto;
      padding:20px 0 60px;
      text-align:center;
      position:relative;
      z-index:2;
    }

    .success-card{
      background:
        radial-gradient(circle at top center, rgba(241,188,101,0.12) 0%, transparent 25%),
        linear-gradient(180deg, rgba(18,23,41,0.98), rgba(14,18,33,0.99));
      border:1px solid rgba(240,196,109,0.18);
      border-radius:36px;
      box-shadow:var(--shadow);
      padding:42px 28px;
    }

    .success-icon{
      width:110px;
      height:110px;
      border-radius:50%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 18%),
        linear-gradient(180deg, #e2b05b 0%, #b97722 100%);
      color:#fffaf2;
      font-size:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 22px;
      box-shadow:0 16px 30px rgba(167,103,23,0.28);
    }

    .success-title{
      font-family:Georgia, "Times New Roman", serif;
      font-size:clamp(34px, 5vw, 58px);
      line-height:.96;
      margin:0 0 14px;
      color:#f9f1e4;
    }

    .success-text{
      color:#cfc0ab;
      font-size:18px;
      line-height:1.65;
      max-width:620px;
      margin:0 auto 18px;
    }

    .success-order{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(240,196,109,0.08);
      color:#efc878;
      border:1px solid rgba(240,196,109,0.16);
      font-size:14px;
      font-weight:700;
      margin-bottom:24px;
    }

    .success-meta{
      margin:0 auto 24px;
      max-width:560px;
      text-align:left;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:18px 20px;
    }

    .success-line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,0.08);
      color:#d3c4b0;
      font-size:15px;
    }

    .success-line:last-child{
      border-bottom:none;
    }

    .success-actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    @media (max-width:640px){
      .success-actions{
        flex-direction:column;
      }

      .success-actions .continue-btn,
      .success-actions .secondary-btn{
        width:100%;
      }
    }
  </style>
</head>
<body class="setup-body">

  <header class="wizard-topbar">
    <div class="wizard-topbar-left"></div>

    <div class="wizard-brand">
      <div class="logo-mark">
        <div class="logo-book"><span></span></div>
      </div>
      <span class="wizard-brand-text">lifebook</span>
    </div>

    <div class="wizard-topbar-right"></div>
  </header>

  <main class="success-shell">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="eyebrow" style="margin-bottom:14px;">Payment completed</div>
      <h1 class="success-title">Your order is complete</h1>
      <div class="success-text">
        Your personalized book has been unlocked and moved into the delivery center.
      </div>

      <div class="success-order" id="successOrderId">Order ID: -</div>

      <div class="success-meta" id="successMeta"></div>

      <div class="success-actions">
        <button class="continue-btn" id="goToDeliveryBtn" type="button">Open Delivery Center</button>
        <button class="secondary-btn" id="goToFullBookBtn" type="button">Open Full Book</button>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const urlOrderId = params.get("orderId");
    const localOrderId = localStorage.getItem("orderId");
    const orderId = urlOrderId || localOrderId;

    async function loadOrder() {
      if (!orderId) return;

      document.getElementById("successOrderId").textContent = "Order ID: " + orderId;

      try {
        const res = await fetch(`${API_BASE}/order/${encodeURIComponent(orderId)}`);
        const data = await res.json();

        if (!res.ok) return;

        const order = data.order;
        const meta = document.getElementById("successMeta");

        meta.innerHTML = `
          <div class="success-line"><span>Status</span><span>${order.status}</span></div>
          <div class="success-line"><span>Child</span><span>${order.customer?.childName || "-"}</span></div>
          <div class="success-line"><span>Book</span><span>${order.book?.title || "-"}</span></div>
          <div class="success-line"><span>Amount</span><span>$${order.amount}</span></div>
        `;
      } catch (error) {
        console.error("Failed to load order");
      }
    }

    loadOrder();

    document.getElementById("goToDeliveryBtn").addEventListener("click", () => {
      window.location.href = "delivery.html";
    });

    document.getElementById("goToFullBookBtn").addEventListener("click", () => {
      window.location.href = "preview.html";
    });
  </script>
</body>
</html>
