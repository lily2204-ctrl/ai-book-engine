<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Your Book is Ready!</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Arial,sans-serif;
      background:radial-gradient(circle at top,rgba(27,46,94,0.55) 0%,rgba(10,16,34,0.96) 55%,rgba(5,10,20,1) 100%),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;background-position:center;color:#fff8ec;min-height:100vh;
    }
    .shell{width:min(960px,94vw);margin:0 auto;padding:24px 0 60px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .brand{display:flex;align-items:center;gap:12px;font-family:Georgia,serif;font-size:26px;color:#f7ecd7}
    .brand img{height:42px;width:auto}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:22px;align-items:start}
    .side-card,.main-card{
      background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.03)),
        linear-gradient(180deg,rgba(18,23,41,0.96),rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);border-radius:28px;box-shadow:0 18px 60px rgba(0,0,0,0.34)
    }
    .side-card{padding:16px;position:sticky;top:16px}
    .cover{width:100%;aspect-ratio:0.75/1;border-radius:18px;overflow:hidden;border:2px solid rgba(234,190,94,0.45);background:linear-gradient(180deg,#10182d,#0b1222);position:relative}
    .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .cover-frame{position:absolute;inset:12px;border:1.5px solid rgba(243,203,121,0.42);border-radius:12px;pointer-events:none;z-index:2}
    .main-card{padding:28px}
    .badge{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 16px;background:rgba(240,196,109,0.1);border:1px solid rgba(240,196,109,0.18);color:#efc977;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:16px}
    .main-title{margin:0 0 12px;font-family:Georgia,serif;font-size:clamp(32px,5vw,52px);line-height:1;color:#fff7e8}
    .main-copy{margin:0 0 22px;font-size:16px;line-height:1.7;color:#d7c8b3}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
    .info-item{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(240,196,109,0.10)}
    .info-label{font-size:12px;font-weight:700;color:#e9c57c;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
    .info-value{font-size:15px;color:#fff6e6}
    .btn-primary{display:block;width:100%;padding:16px;border:none;border-radius:999px;background:linear-gradient(180deg,#f0c46d,#d08e2b);color:#fffaf1;cursor:pointer;font-weight:700;font-size:18px;box-shadow:0 10px 24px rgba(208,142,43,0.28);margin-bottom:10px;text-align:center;text-decoration:none}
    .btn-secondary{display:block;width:100%;padding:14px;border-radius:999px;border:1px solid rgba(240,196,109,0.16);cursor:pointer;font-weight:700;background:rgba(255,255,255,0.05);color:#fff8ec;font-size:15px;text-align:center;margin-bottom:10px}
    .status-msg{margin-top:12px;font-size:14px;color:#d7c8b3;line-height:1.5;min-height:20px}
    @media(max-width:820px){
      .layout{grid-template-columns:1fr}
      .side-card{position:static}
    }
    @media(max-width:480px){
      .shell{width:100%;padding:14px 12px 40px;box-sizing:border-box}
      .info-grid{grid-template-columns:1fr}
      .main-card{padding:18px}
    }
  </style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <img src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook" onerror="this.style.display='none'">
      <span>lifebook</span>
    </div>
  </header>

  <section class="layout">
    <aside class="side-card">
      <div class="cover">
        <img id="successCoverFill" alt="Book cover"/>
        <div class="cover-frame"></div>
      </div>
    </aside>

    <main class="main-card">
      <div class="badge">✓ Order Complete</div>
      <h1 class="main-title">Your book is ready!</h1>
      <p class="main-copy">Your personalized storybook has been created. Download it now or open the reader to enjoy it on any device.</p>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Child</div>
          <div class="info-value" id="successChildName">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Book</div>
          <div class="info-value" id="successBookTitle">-</div>
        </div>
        <div class="info-item">
          <div class="info-label">Format</div>
          <div class="info-value">Digital PDF</div>
        </div>
        <div class="info-item">
          <div class="info-label">Pages</div>
          <div class="info-value" id="successPages">-</div>
        </div>
      </div>

      <button id="openBookBtn" class="btn-primary" type="button">📖 Open Your Book</button>
      <button id="goHomeBtn" class="btn-secondary" type="button">Back to Home</button>
      <button id="createAnotherBtn" class="btn-secondary" type="button">Create Another Book</button>

      <div id="successStatusMsg" class="status-msg">Loading your order...</div>
    </main>
  </section>
</div>

<script type="module" src="./success.js"></script>
</body>
</html>
