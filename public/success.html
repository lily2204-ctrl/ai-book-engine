<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Payment Success</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-shell {
      width: min(760px, 94vw);
      margin: 0 auto;
      padding: 50px 0 60px;
      text-align: center;
    }

    .success-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.14);
      padding: 40px 28px;
    }

    .success-icon {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #eef9e9;
      color: #69af53;
      font-size: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      box-shadow: 0 12px 24px rgba(105,175,83,0.12);
    }

    .success-title {
      font-size: clamp(30px, 4vw, 46px);
      margin: 0 0 14px;
    }

    .success-text {
      color: #6d6d6d;
      font-size: 18px;
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto 18px;
    }

    .success-order {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: #faf7f0;
      color: #9c6a14;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .success-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .success-btn,
    .success-btn-secondary {
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 28px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .success-btn {
      background: #e4ab4b;
      color: white;
    }

    .success-btn:hover {
      background: #cf9432;
    }

    .success-btn-secondary {
      background: white;
      color: #333;
      border: 1px solid #ddd;
    }

    .success-btn-secondary:hover {
      background: #f7f7f7;
    }
  </style>
</head>
<body class="setup-body">

  <div class="success-shell">
    <div class="wizard-brand" style="justify-content:center; margin-bottom: 20px;">
      <div class="logo-mark small"></div>
      <span class="wizard-brand-text">lifebook</span>
    </div>

    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1 class="success-title">Payment completed</h1>
      <div class="success-text">
        Your book is now unlocked. You can continue to the full preview and open the print-ready version.
      </div>

      <div class="success-order" id="successOrderId">Order ID: -</div>

      <div class="success-actions">
        <button class="success-btn" id="goToFullBookBtn" type="button">Open Full Book</button>
        <button class="success-btn-secondary" id="goToPrintBtn" type="button">Print Ready View</button>
      </div>
    </div>
  </div>

  <script>
    const orderId = localStorage.getItem("orderId");
    if (orderId) {
      document.getElementById("successOrderId").textContent = "Order ID: " + orderId;
    }

    document.getElementById("goToFullBookBtn").addEventListener("click", () => {
      window.location.href = "preview.html";
    });

    document.getElementById("goToPrintBtn").addEventListener("click", () => {
      window.location.href = "print.html";
    });
  </script>
</body>
</html>
