<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Opening Your Book</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      color:#fff8ec;
      background:
        radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;
      background-position:center;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .card{
      width:min(720px, 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);
      border-radius:30px;
      box-shadow:0 18px 60px rgba(0,0,0,0.34);
      padding:32px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:22px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:28px;
      color:#f7ecd7;
    }

    .brand img{
      height:46px;
      width:auto;
      display:block;
    }

    h1{
      margin:0 0 14px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:clamp(36px, 6vw, 64px);
      line-height:0.95;
      color:#fff7e8;
    }

    p{
      margin:0 0 18px;
      color:#d7c8b3;
      font-size:18px;
      line-height:1.65;
    }

    .status{
      margin-top:10px;
      padding:16px 18px;
      border-radius:18px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(240,196,109,0.12);
      color:#fff1cf;
      font-size:16px;
      line-height:1.6;
      min-height:24px;
    }

    .status.error{
      color:#ffbaba;
    }

    .actions{
      margin-top:22px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn,
    .btn-secondary{
      padding:16px 24px;
      border-radius:999px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      border:none;
    }

    .btn{
      background:linear-gradient(180deg,#f0c46d,#d08e2b);
      color:#fffaf1;
      box-shadow:0 10px 24px rgba(208,142,43,0.28);
    }

    .btn-secondary{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(240,196,109,0.16);
      color:#fff8ec;
    }

    @media(max-width:640px){
      .card{
        padding:22px 18px;
        border-radius:24px;
      }

      p{
        font-size:16px;
      }

      .actions{
        flex-direction:column;
      }

      .btn,
      .btn-secondary{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo">
      <span>lifebook</span>
    </div>

    <h1>Opening your book</h1>
    <p>
      We’re checking your order and unlocking your personalized storybook now.
    </p>

    <div class="status" id="openBookStatus">Checking payment status...</div>

    <div class="actions">
      <button class="btn" id="retryBtn" type="button">Try again</button>
      <button class="btn-secondary" id="goHomeBtn" type="button">Back to home</button>
    </div>
  </div>

  <script type="module" src="./open-book.js"></script>
</body>
</html>
