<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Checkout</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Arial,sans-serif;color:#fff8ec;
      background:radial-gradient(circle at top,rgba(27,46,94,0.55),rgba(5,10,20,1)),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;background-position:center;min-height:100vh;
    }
    .container{width:min(960px,94vw);margin:auto;padding:24px 0 60px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
    .back{border:1px solid rgba(240,196,109,0.2);padding:11px 18px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,0.04);color:#fff8ec;font-weight:700;font-size:15px}
    .brand{display:flex;align-items:center;gap:12px;font-family:Georgia,serif;font-size:26px;color:#f7ecd7}
    .brand img{height:42px;width:auto}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
    .cover-card,.content{
      background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.03)),
        linear-gradient(180deg,rgba(18,23,41,0.96),rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);border-radius:28px;box-shadow:0 18px 60px rgba(0,0,0,0.34)
    }
    .cover-card{padding:16px;position:sticky;top:16px}
    .cover{border-radius:18px;overflow:hidden;border:1px solid rgba(240,196,109,0.2);background:rgba(255,255,255,0.04);min-height:200px;display:flex;align-items:center;justify-content:center}
    .cover img{width:100%;display:block;object-fit:cover}
    .content{padding:26px}
    .title{font-size:clamp(32px,5vw,52px);line-height:1;font-family:Georgia,serif;margin:0 0 18px;color:#fff7e8}
    .book-summary{margin-bottom:20px;padding:16px 18px;background:rgba(255,255,255,0.04);border-radius:18px;border:1px solid rgba(240,196,109,0.10)}
    .book-title-text{font-family:Georgia,serif;font-size:22px;color:#f0c46d;margin-bottom:4px}
    .book-subtitle-text{font-size:14px;color:#c0b090}
    .details-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .detail-item{background:rgba(255,255,255,0.04);border-radius:14px;padding:12px 14px;border:1px solid rgba(240,196,109,0.08)}
    .detail-label{color:#e9c57c;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
    .detail-value{color:#fff8ec;font-size:14px}
    .price-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:rgba(240,196,109,0.07);border-radius:18px;border:1px solid rgba(240,196,109,0.2);margin-bottom:20px}
    .price-label{color:#d7c8b3;font-size:16px}
    .price-amount{font-family:Georgia,serif;font-size:32px;color:#f0c46d;font-weight:700}
    .price-type{font-size:13px;color:#a0906c;margin-top:2px}
    .btn{width:100%;padding:16px;border:none;border-radius:999px;background:linear-gradient(180deg,#f0c46d,#d08e2b);color:#fffaf1;cursor:pointer;font-weight:700;font-size:18px;box-shadow:0 10px 24px rgba(208,142,43,0.28);margin-bottom:10px}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .btn-back{width:100%;padding:14px;border-radius:999px;border:1px solid rgba(240,196,109,0.16);cursor:pointer;font-weight:700;background:rgba(255,255,255,0.05);color:#fff8ec;font-size:15px}
    .status-note{margin-top:12px;font-size:14px;color:#d7c8b3;line-height:1.5;min-height:20px}
    .status-note.error{color:#ffb5b5}
    .trust-badges{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    .badge{font-size:12px;color:#a09080;display:flex;align-items:center;gap:4px}
    @media(max-width:820px){
      .layout{grid-template-columns:1fr}
      .cover-card{position:static}
      .details-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:480px){
      .container{width:100%;padding:14px 12px 40px;box-sizing:border-box}
      .details-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top">
    <button class="back" id="backToPreviewBtn" type="button">← Back</button>
    <div class="brand">
      <img src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo" onerror="this.style.display='none'">
      <span>lifebook</span>
    </div>
  </div>

  <div class="layout">
    <div class="cover-card">
      <div class="cover">
        <img id="coverImage" alt="Book cover"/>
      </div>
    </div>

    <div class="content">
      <h1 class="title">Your book is ready</h1>

      <div class="book-summary">
        <div class="book-title-text" id="bookTitleValue">Loading...</div>
        <div class="book-subtitle-text" id="bookSubtitleValue"></div>
      </div>

      <div class="details-grid">
        <div class="detail-item">
          <div class="detail-label">Child</div>
          <div class="detail-value" id="name">-</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Age</div>
          <div class="detail-value" id="age">-</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Style</div>
          <div class="detail-value" id="style">-</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Pages</div>
          <div class="detail-value" id="pages">-</div>
        </div>
      </div>

      <div class="price-row">
        <div>
          <div class="price-label">Digital Storybook</div>
          <div class="price-type">Instant PDF download</div>
        </div>
        <div class="price-amount">$39</div>
      </div>

      <button class="btn" id="proceedToPaymentBtn" type="button">Pay Securely — $39</button>
      <button class="btn-back" id="backToCoverBtn" type="button">← Edit Cover</button>

      <div class="status-note" id="checkoutStatus"></div>

      <div class="trust-badges">
        <span class="badge">🔒 Secure checkout</span>
        <span class="badge">⚡ Instant download</span>
        <span class="badge">✓ Stripe encrypted</span>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./checkout.js"></script>
</body>
</html>
