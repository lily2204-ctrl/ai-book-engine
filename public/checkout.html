<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff8ec;
  background:
    radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
    url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
  background-size:cover;
}

.container{
  width:min(1200px,94vw);
  margin:auto;
  padding:30px 0;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

.cover{
  border-radius:30px;
  overflow:hidden;
  border:1px solid rgba(240,196,109,0.2);
}

.cover img{
  width:100%;
  display:block;
}

.block{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
}

.title{
  font-size:60px;
  font-family:Georgia;
}

.btn{
  padding:16px 30px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#f0c46d,#d08e2b);
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

  <div class="layout">

    <!-- COVER -->
    <div class="cover">
      <img id="coverImage"/>
    </div>

    <!-- DETAILS -->
    <div>
      <div class="title">Review your order</div>

      <div class="block">Child name: <span id="name"></span></div>
      <div class="block">Age: <span id="age"></span></div>
      <div class="block">Style: <span id="style"></span></div>
      <div class="block">Pages: <span id="pages"></span></div>

      <br>

      <button class="btn">Proceed to Payment</button>
    </div>

  </div>

</div>

<script type="module" src="./checkout.js"></script>
</body>
</html>
