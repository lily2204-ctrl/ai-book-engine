<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Checkout</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      color:#fff8ec;
      background:
        radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;
      background-position:center;
      min-height:100vh;
    }

    .container{
      width:min(1200px,94vw);
      margin:auto;
      padding:24px 0 60px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .back{
      border:1px solid rgba(240,196,109,0.2);
      padding:12px 18px;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,0.04);
      color:#fff8ec;
      font-weight:700;
      font-size:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:28px;
      color:#f7ecd7;
    }

    .brand img{
      height:46px;
      width:auto;
      display:block;
    }

    .layout{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:22px;
      align-items:start;
    }

    .cover-card,
    .content{
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);
      border-radius:30px;
      box-shadow:0 18px 60px rgba(0,0,0,0.34);
    }

    .cover-card{
      padding:18px;
      position:sticky;
      top:18px;
    }

    .cover{
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(240,196,109,0.2);
      background:rgba(255,255,255,0.04);
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .cover img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    .content{
      padding:28px;
    }

    .title{
      font-size:clamp(40px, 6vw, 72px);
      line-height:0.95;
      font-family:Georgia, "Times New Roman", serif;
      margin:0 0 20px;
      color:#fff7e8;
    }

    .block{
      background:rgba(255,255,255,0.04);
      border-radius:20px;
      padding:18px 22px;
      margin-bottom:14px;
      border:1px solid rgba(240,196,109,0.10);
      font-size:18px;
      line-height:1.5;
      display:grid;
      grid-template-columns:220px 1fr;
      gap:14px;
      align-items:start;
    }

    .label{
      color:#e9c57c;
      font-weight:700;
    }

    .value{
      color:#fff8ec;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .buttons{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .btn{
      padding:16px 30px;
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg,#f0c46d,#d08e2b);
      color:#fffaf1;
      cursor:pointer;
      font-weight:700;
      font-size:17px;
      box-shadow:0 10px 24px rgba(208,142,43,0.28);
    }

    .btn-secondary{
      padding:16px 30px;
      border-radius:999px;
      border:1px solid rgba(240,196,109,0.16);
      cursor:pointer;
      font-weight:700;
      background:rgba(255,255,255,0.05);
      color:#fff8ec;
      font-size:17px;
    }

    .status-note{
      margin-top:16px;
      font-size:15px;
      color:#d7c8b3;
      line-height:1.6;
      min-height:24px;
    }

    @media(max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }

      .cover-card{
        position:static;
      }

      .content{
        padding:22px;
      }

      .block{
        grid-template-columns:1fr;
        gap:8px;
      }
    }

    @media(max-width:640px){
      .container{
        width:min(100%, 100vw);
        padding:16px 12px 42px;
        box-sizing:border-box;
      }

      .top{
        align-items:flex-start;
      }

      .brand{
        font-size:24px;
      }

      .brand img{
        height:40px;
      }

      .back{
        font-size:15px;
        padding:11px 16px;
      }

      .cover-card{
        padding:14px;
        border-radius:24px;
      }

      .cover{
        border-radius:18px;
        min-height:180px;
      }

      .content{
        padding:18px;
        border-radius:24px;
      }

      .title{
        font-size:clamp(34px, 12vw, 52px);
        line-height:0.95;
        margin-bottom:18px;
      }

      .block{
        padding:15px 16px;
        border-radius:18px;
        font-size:16px;
        margin-bottom:12px;
      }

      .buttons{
        flex-direction:column;
        gap:12px;
        margin-top:20px;
      }

      .btn,
      .btn-secondary{
        width:100%;
        font-size:16px;
        padding:16px 18px;
      }

      .status-note{
        font-size:14px;
        margin-top:14px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="top">
    <button class="back" id="backToPreviewBtn">← Back</button>

    <div class="brand">
      <img src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo">
      <span>lifebook</span>
    </div>
  </div>

  <div class="layout">
    <div class="cover-card">
      <div class="cover">
        <img id="coverImage" alt="Book cover"/>
      </div>
    </div>

    <div class="content">
      <h1 class="title">Review your order</h1>

      <div class="block">
        <div class="label">Book title</div>
        <div class="value" id="bookTitleValue">-</div>
      </div>

      <div class="block">
        <div class="label">Book subtitle</div>
        <div class="value" id="bookSubtitleValue">-</div>
      </div>

      <div class="block">
        <div class="label">Child name</div>
        <div class="value" id="name">-</div>
      </div>

      <div class="block">
        <div class="label">Age</div>
        <div class="value" id="age">-</div>
      </div>

      <div class="block">
        <div class="label">Style</div>
        <div class="value" id="style">-</div>
      </div>

      <div class="block">
        <div class="label">Story direction</div>
        <div class="value" id="story">-</div>
      </div>

      <div class="block">
        <div class="label">Pages</div>
        <div class="value" id="pages">-</div>
      </div>

      <div class="buttons">
        <button class="btn" id="proceedToPaymentBtn">Proceed to Payment</button>
        <button class="btn-secondary" id="backToCoverBtn">Back to Cover</button>
      </div>

      <div class="status-note" id="checkoutStatus"></div>
    </div>
  </div>

</div>

<script type="module" src="./checkout.js"></script>
</body>
</html>
