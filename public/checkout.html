<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff8ec;
  background:
    radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
    url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
  background-size:cover;
  background-position:center;
  min-height:100vh;
}

.container{
  width:min(1200px,94vw);
  margin:auto;
  padding:30px 0 60px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:20px;
  flex-wrap:wrap;
}

.back{
  border:1px solid rgba(240,196,109,0.2);
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  background:rgba(255,255,255,0.04);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-family:Georgia, "Times New Roman", serif;
  font-size:28px;
  color:#f7ecd7;
}

.brand img{
  height:46px;
  width:auto;
  display:block;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
  align-items:start;
}

.cover{
  border-radius:30px;
  overflow:hidden;
  border:1px solid rgba(240,196,109,0.2);
  background:rgba(255,255,255,0.04);
  box-shadow:0 18px 60px rgba(0,0,0,0.34);
  position:sticky;
  top:20px;
}

.cover img{
  width:100%;
  display:block;
}

.content{
  padding:26px;
  border-radius:30px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(240,196,109,0.14);
  box-shadow:0 18px 60px rgba(0,0,0,0.34);
}

.title{
  font-size:60px;
  line-height:0.95;
  font-family:Georgia, "Times New Roman", serif;
  margin:0 0 20px;
}

.block{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid rgba(240,196,109,0.10);
  font-size:18px;
  line-height:1.5;
}

.block strong{
  color:#e9c57c;
}

.format-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:22px;
}

.format-card{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:18px;
  border:1px solid rgba(240,196,109,0.10);
  cursor:pointer;
  transition:transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

.format-card:hover{
  transform:translateY(-1px);
}

.format-card.active{
  border-color:rgba(240,196,109,0.42);
  background:rgba(240,196,109,0.08);
}

.format-title{
  font-family:Georgia, "Times New Roman", serif;
  font-size:28px;
  margin:0 0 8px;
}

.format-price{
  font-size:26px;
  font-weight:bold;
  color:#f0c46d;
  margin-bottom:10px;
}

.format-desc{
  font-size:16px;
  line-height:1.5;
  color:#d7c8b3;
}

.buttons{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:24px;
}

.btn{
  padding:16px 30px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#f0c46d,#d08e2b);
  color:#fffaf1;
  cursor:pointer;
  font-weight:bold;
  font-size:17px;
}

.btn-secondary{
  padding:16px 30px;
  border-radius:999px;
  border:1px solid rgba(240,196,109,0.16);
  cursor:pointer;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  color:#fff8ec;
  font-size:17px;
}

@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  .cover{
    position:static;
  }

  .title{
    font-size:46px;
  }

  .format-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div class="back" id="backToPreviewBtn">← Back</div>

    <div class="brand">
      <img id="checkoutBrandLogo" src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo">
      <span>lifebook</span>
    </div>
  </div>

  <div class="layout">

    <div class="cover">
      <img id="checkoutCoverFill" alt="Book cover"/>
    </div>

    <div class="content">
      <div class="title">Review your order</div>

      <div class="block"><strong>Book title:</strong> <span id="checkoutBookTitle"></span></div>
      <div class="block"><strong>Book subtitle:</strong> <span id="checkoutBookSubtitle"></span></div>
      <div class="block"><strong>Child name:</strong> <span id="summaryChildName"></span></div>
      <div class="block"><strong>Age:</strong> <span id="summaryAge"></span></div>
      <div class="block"><strong>Style:</strong> <span id="summaryStyle"></span></div>
      <div class="block"><strong>Story direction:</strong> <span id="summaryStory"></span></div>
      <div class="block"><strong>Pages:</strong> <span id="summaryPages"></span></div>

      <div class="format-grid">
        <div class="format-card active" id="formatDigital">
          <div class="format-title">Digital Book</div>
          <div class="format-price">$39</div>
          <div class="format-desc">Instant digital version for online delivery.</div>
        </div>

        <div class="format-card" id="formatPrinted">
          <div class="format-title">Printed Book</div>
          <div class="format-price">$49</div>
          <div class="format-desc">Printed keepsake version for physical delivery.</div>
        </div>
      </div>

      <div class="buttons">
        <button class="btn" id="goToCheckoutBtn">Proceed to Payment</button>
        <button class="btn-secondary" id="goToSuccessPreviewBtn">Preview success page</button>
      </div>
    </div>

  </div>

</div>

<script type="module" src="./checkout.js"></script>
</body>
</html>
