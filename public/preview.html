<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Preview</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:#fff8ec;
      background:
        radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;
    }

    .container{
      width:min(1200px,94vw);
      margin:auto;
      padding:30px 0;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .back{
      border:1px solid rgba(240,196,109,0.2);
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
    }

    .title{
      font-family:Georgia;
      font-size:60px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#cfc0ab;
      margin-bottom:30px;
    }

    .layout{
      display:grid;
      grid-template-columns:400px 1fr;
      gap:20px;
    }

    .cover{
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(240,196,109,0.2);
    }

    .cover img{
      width:100%;
      display:block;
    }

    .page{
      margin-bottom:30px;
      padding:20px;
      border-radius:24px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(240,196,109,0.1);
    }

    .page-label{
      font-size:14px;
      color:#e9c57c;
      margin-bottom:10px;
    }

    .page-text{
      font-size:22px;
      line-height:1.6;
    }

    .image-box{
      width:100%;
      height:200px;
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:15px;
    }

    .cta{
      margin-top:30px;
    }

    .btn{
      padding:16px 30px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:bold;
      background:linear-gradient(180deg,#f0c46d,#d08e2b);
    }

    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="top">
      <div class="back" onclick="history.back()">← Back</div>
      <div>lifebook</div>
    </div>

    <div class="layout">
      <!-- COVER -->
      <div class="cover">
        <img id="coverImage"/>
      </div>

      <!-- CONTENT -->
      <div>
        <div class="title" id="bookTitle"></div>
        <div class="subtitle" id="bookSubtitle"></div>

        <div id="pagesContainer"></div>

        <div class="cta">
          <button class="btn" onclick="location.href='checkout.html'">
            Continue to Checkout
          </button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./preview.js"></script>
</body>
</html>
