<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Preview</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      color:#fff8ec;
      background:
        radial-gradient(circle at top, rgba(27,46,94,0.55), rgba(5,10,20,1)),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size:cover;
      background-position:center;
      min-height:100vh;
    }

    .container{
      width:min(1200px,94vw);
      margin:auto;
      padding:24px 0 60px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .back{
      border:1px solid rgba(240,196,109,0.2);
      padding:12px 18px;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,0.04);
      color:#fff8ec;
      font-weight:700;
      font-size:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:28px;
      color:#f7ecd7;
    }

    .brand img{
      height:46px;
      width:auto;
      display:block;
    }

    .layout{
      display:grid;
      grid-template-columns:400px 1fr;
      gap:22px;
      align-items:start;
    }

    .cover-card,
    .content-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);
      border-radius:30px;
      box-shadow:0 18px 60px rgba(0,0,0,0.34);
    }

    .cover-card{
      padding:20px;
      position:sticky;
      top:18px;
    }

    .cover{
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(240,196,109,0.2);
      background:rgba(255,255,255,0.04);
    }

    .cover img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    .content-card{
      padding:28px;
    }

    .title{
      font-family:Georgia, "Times New Roman", serif;
      font-size:clamp(40px, 6vw, 72px);
      line-height:0.95;
      margin:0 0 12px;
      color:#fff7e8;
    }

    .subtitle{
      color:#d7c8b3;
      font-size:20px;
      line-height:1.6;
      margin-bottom:22px;
    }

    .unlock-note{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(240,196,109,0.12);
      border-radius:20px;
      padding:18px 20px;
      color:#fff1cf;
      font-size:16px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .page{
      margin-bottom:24px;
      padding:22px;
      border-radius:24px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(240,196,109,0.10);
    }

    .page-label{
      display:inline-block;
      font-size:14px;
      font-weight:700;
      color:#e9c57c;
      margin-bottom:14px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .image-box{
      width:100%;
      min-height:240px;
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:16px;
      color:#fff1cf;
      font-size:18px;
      text-align:center;
      overflow:hidden;
    }

    .page-text{
      font-size:22px;
      line-height:1.7;
      color:#fff8ec;
    }

    .cta{
      margin-top:28px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .btn{
      padding:16px 30px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:700;
      font-size:17px;
      background:linear-gradient(180deg,#f0c46d,#d08e2b);
      color:#fffaf1;
      box-shadow:0 10px 24px rgba(208,142,43,0.28);
    }

    .btn-secondary{
      padding:16px 30px;
      border-radius:999px;
      border:1px solid rgba(240,196,109,0.16);
      cursor:pointer;
      font-weight:700;
      font-size:17px;
      background:rgba(255,255,255,0.05);
      color:#fff8ec;
    }

    @media(max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }

      .cover-card{
        position:static;
      }

      .content-card{
        padding:22px;
      }

      .subtitle{
        font-size:18px;
      }

      .page-text{
        font-size:19px;
      }

      .image-box{
        min-height:220px;
      }
    }

    @media(max-width:640px){
      .container{
        width:min(100%, 100vw);
        padding:16px 12px 42px;
        box-sizing:border-box;
      }

      .top{
        align-items:flex-start;
      }

      .brand{
        font-size:24px;
      }

      .brand img{
        height:40px;
      }

      .back{
        font-size:15px;
        padding:11px 16px;
      }

      .cover-card{
        padding:14px;
        border-radius:24px;
      }

      .content-card{
        padding:18px;
        border-radius:24px;
      }

      .title{
        font-size:clamp(34px, 12vw, 52px);
        line-height:0.95;
      }

      .subtitle{
        font-size:17px;
        line-height:1.55;
        margin-bottom:18px;
      }

      .unlock-note{
        padding:16px;
        border-radius:18px;
        font-size:15px;
        line-height:1.55;
        margin-bottom:22px;
      }

      .page{
        padding:16px;
        border-radius:20px;
        margin-bottom:18px;
      }

      .page-label{
        font-size:13px;
        margin-bottom:12px;
      }

      .image-box{
        min-height:180px;
        border-radius:16px;
        margin-bottom:14px;
        font-size:16px;
      }

      .page-text{
        font-size:17px;
        line-height:1.65;
      }

      .cta{
        flex-direction:column;
        gap:12px;
        margin-top:22px;
      }

      .btn,
      .btn-secondary{
        width:100%;
        font-size:16px;
        padding:16px 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="top">
      <button class="back" onclick="history.back()">← Back</button>

      <div class="brand">
        <img src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo">
        <span>lifebook</span>
      </div>
    </div>

    <div class="layout">
      <div class="cover-card">
        <div class="cover">
          <img id="coverImage" alt="Book cover"/>
        </div>
      </div>

      <div class="content-card">
        <h1 class="title" id="bookTitle"></h1>
        <div class="subtitle" id="bookSubtitle"></div>

        <div class="unlock-note" id="unlockNote">
          You are currently viewing only the first 2 preview pages. Complete payment to unlock the full book.
        </div>

        <div id="pagesContainer"></div>

        <div class="cta">
          <button class="btn" id="goToCheckoutBtn">Unlock Full Book</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./preview.js"></script>
</body>
</html>
