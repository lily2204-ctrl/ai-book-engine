<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Preview</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .preview-shell {
      width: min(1080px, 94vw);
      margin: 0 auto;
      padding: 26px 0 60px;
    }

    .preview-header-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.1);
      padding: 20px 24px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .preview-header-left h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
    }

    .preview-header-left p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .header-action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview-grid {
      display: grid;
      gap: 18px;
    }

    .page-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.1);
      padding: 24px;
    }

    .page-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start;
    }

    .page-image-box {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, #f7f0e4, #fdfaf3);
      border: 1px solid #efe2cc;
    }

    .page-image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .page-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      color: #8b7c62;
      padding: 20px;
      line-height: 1.5;
    }

    .page-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b48b42;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .page-text {
      font-size: 22px;
      line-height: 1.65;
      margin-bottom: 0;
    }

    .locked-card {
      background: linear-gradient(180deg, #fff8eb, #f7efe1);
      border: 1px solid #f1dfbc;
      border-radius: 28px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.08);
      padding: 36px 28px;
      text-align: center;
    }

    .locked-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: white;
      color: #e4ab4b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.08);
    }

    .locked-title {
      font-size: 34px;
      margin: 0 0 12px;
    }

    .locked-text {
      color: #777;
      font-size: 18px;
      line-height: 1.6;
      max-width: 620px;
      margin: 0 auto 24px;
    }

    .unlock-full-btn {
      border: none;
      border-radius: 999px;
      background: #e4ab4b;
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 30px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .unlock-full-btn:hover {
      background: #cf9432;
    }

    .unlock-note {
      margin-top: 14px;
      color: #888;
      font-size: 13px;
      line-height: 1.5;
    }

    .prefetch-note {
      margin-top: 10px;
      font-size: 13px;
      color: #8b7c62;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .page-layout {
        grid-template-columns: 1fr;
      }

      .page-text {
        font-size: 19px;
      }
    }
  </style>
</head>
<body class="setup-body">

  <div class="preview-shell">
    <header class="wizard-topbar">
      <div class="wizard-topbar-left">
        <button class="back-link-button" id="backToCover" type="button">← Back</button>
      </div>

      <div class="wizard-brand">
        <div class="logo-mark small"></div>
        <span class="wizard-brand-text">lifebook</span>
      </div>

      <div class="wizard-topbar-right"></div>
    </header>

    <div class="preview-header-card">
      <div class="preview-header-left">
        <h1 id="previewBookTitle">Book Preview</h1>
        <p id="previewBookSubtitle">Your preview is ready.</p>
        <div id="prefetchNote" class="prefetch-note"></div>
      </div>

      <div class="header-action-row">
        <button class="continue-btn" id="headerUnlockBtn" type="button" style="display:none;">
          Unlock Full Book - $49
        </button>
        <button class="continue-btn" id="printReadyBtn" type="button" style="display:none;">
          Print Ready View
        </button>
      </div>
    </div>

    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const DB_NAME = "lifebookDB";
    const STORE_NAME = "images";
    const PREFETCH_CONCURRENCY = window.innerWidth < 768 ? 2 : 3;

    const rawBookData = localStorage.getItem("bookData");
    const previewGrid = document.getElementById("previewGrid");
    const headerUnlockBtn = document.getElementById("headerUnlockBtn");
    const printReadyBtn = document.getElementById("printReadyBtn");
    const prefetchNote = document.getElementById("prefetchNote");

    if (!rawBookData) {
      window.location.href = "cover.html";
    }

    const bookData = JSON.parse(rawBookData);
    const fullUnlocked = localStorage.getItem("paid") === "true";
    const pages = Array.isArray(bookData.pages) ? bookData.pages : [];
    const visiblePages = fullUnlocked ? pages : pages.slice(0, 2);

    const inFlightRequests = new Map();

    document.getElementById("previewBookTitle").textContent =
      bookData.title || "Your preview";

    document.getElementById("previewBookSubtitle").textContent =
      bookData.subtitle || "A personalized storybook preview";

    document.getElementById("backToCover").addEventListener("click", () => {
      window.location.href = "cover.html";
    });

    if (!fullUnlocked) {
      headerUnlockBtn.style.display = "inline-flex";
    } else {
      printReadyBtn.style.display = "inline-flex";
    }

    headerUnlockBtn.addEventListener("click", goToCheckout);
    printReadyBtn.addEventListener("click", () => {
      window.location.href = "print.html";
    });

    function goToCheckout() {
      window.location.href = "checkout.html";
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = function () {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error || new Error("Failed to open IndexedDB"));
        };
      });
    }

    async function getImageFromDB(key) {
      const db = await openDatabase();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(key);

        req.onsuccess = function () {
          resolve(req.result || null);
        };

        req.onerror = function () {
          reject(req.error || new Error("Failed to read image from DB"));
        };
      });
    }

    async function saveImageToDB(key, value) {
      const db = await openDatabase();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        const req = store.put(value, key);

        req.onsuccess = function () {
          resolve(true);
        };

        req.onerror = function () {
          reject(req.error || new Error("Failed to save image to DB"));
        };
      });
    }

    function pageImageKey(pageIndex) {
      return `pageImage_${pageIndex}`;
    }

    async function requestPageImageWithRetry(pageIndex, maxAttempts = 3) {
      const existing = await getImageFromDB(pageImageKey(pageIndex));
      if (existing) return existing;

      if (inFlightRequests.has(pageIndex)) {
        return inFlightRequests.get(pageIndex);
      }

      const promise = (async () => {
        const prompt = pages[pageIndex]?.imagePrompt || "";
        if (!prompt) {
          throw new Error(`Missing prompt for page ${pageIndex + 1}`);
        }

        let lastError = null;

        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
          try {
            const res = await fetch(`${API_BASE}/generate-image`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                prompt,
                illustration_style: bookData.illustration_style || "Soft Storybook",
                characterDescription: bookData.characterDescription,
                characterDNA: bookData.characterDNA
              })
            });

            const data = await res.json();

            if (!res.ok) {
              throw new Error(data?.details || data?.message || "Image generation failed");
            }

            if (!data?.imageBase64) {
              throw new Error("No image returned from server");
            }

            await saveImageToDB(pageImageKey(pageIndex), data.imageBase64);
            return data.imageBase64;
          } catch (error) {
            lastError = error;
            if (attempt < maxAttempts) {
              await new Promise((resolve) => setTimeout(resolve, 900));
            }
          }
        }

        throw lastError || new Error("Image generation failed");
      })();

      inFlightRequests.set(pageIndex, promise);

      try {
        return await promise;
      } finally {
        inFlightRequests.delete(pageIndex);
      }
    }

    async function generateImageForCard(pageIndex, imgEl, loaderEl) {
      try {
        const imageBase64 = await requestPageImageWithRetry(pageIndex, 3);
        imgEl.src = `data:image/png;base64,${imageBase64}`;
        imgEl.style.display = "block";
        loaderEl.style.display = "none";
      } catch (error) {
        console.error("Preview image generation failed:", error);
        loaderEl.textContent = "Failed to generate illustration";
      }
    }

    function createPageCard(page, pageIndex) {
      const card = document.createElement("div");
      card.className = "page-card";

      const layout = document.createElement("div");
      layout.className = "page-layout";

      const imageBox = document.createElement("div");
      imageBox.className = "page-image-box";

      const loader = document.createElement("div");
      loader.className = "page-loader";
      loader.textContent = "Generating illustration...";

      const image = document.createElement("img");
      image.alt = "Page illustration";

      imageBox.appendChild(loader);
      imageBox.appendChild(image);

      const content = document.createElement("div");

      const pageTitle = document.createElement("div");
      pageTitle.className = "page-title";
      pageTitle.textContent = `Page ${pageIndex + 1}`;

      const text = document.createElement("div");
      text.className = "page-text";
      text.textContent = page.text || "";

      content.appendChild(pageTitle);
      content.appendChild(text);

      layout.appendChild(imageBox);
      layout.appendChild(content);
      card.appendChild(layout);

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(async (entry) => {
          if (entry.isIntersecting) {
            observer.disconnect();
            await generateImageForCard(pageIndex, image, loader);
          }
        });
      }, { threshold: 0.15 });

      observer.observe(card);

      return card;
    }

    async function countReadyImages() {
      let ready = 0;
      for (let i = 0; i < pages.length; i++) {
        const existing = await getImageFromDB(pageImageKey(i));
        if (existing) ready++;
      }
      return ready;
    }

    async function updatePrefetchNote() {
      const ready = await countReadyImages();
      if (fullUnlocked) {
        prefetchNote.textContent = ready === pages.length
          ? "All illustrations are ready."
          : `Preparing illustrations in background (${ready}/${pages.length})...`;
      } else {
        prefetchNote.textContent = "";
      }
    }

    async function prefetchAllImagesInBackground() {
      if (!fullUnlocked || !pages.length) return;

      await updatePrefetchNote();

      const queue = pages.map((_, index) => index);
      let active = 0;
      let completed = await countReadyImages();

      return new Promise((resolve) => {
        const runNext = () => {
          while (active < PREFETCH_CONCURRENCY && queue.length > 0) {
            const pageIndex = queue.shift();
            active++;

            requestPageImageWithRetry(pageIndex, 3)
              .catch((error) => {
                console.warn(`Background prefetch failed for page ${pageIndex + 1}:`, error);
              })
              .finally(async () => {
                active--;
                completed = await countReadyImages();
                prefetchNote.textContent =
                  completed === pages.length
                    ? "All illustrations are ready."
                    : `Preparing illustrations in background (${completed}/${pages.length})...`;

                if (queue.length === 0 && active === 0) {
                  resolve();
                } else {
                  runNext();
                }
              });
          }
        };

        runNext();
      });
    }

    visiblePages.forEach((page, index) => {
      previewGrid.appendChild(createPageCard(page, index));
    });

    if (!fullUnlocked && pages.length > 2) {
      const lockedCard = document.createElement("div");
      lockedCard.className = "locked-card";
      lockedCard.innerHTML = `
        <div class="locked-icon">🔒</div>
        <h2 class="locked-title">Unlock the rest of the story</h2>
        <div class="locked-text">
          You’ve seen the beginning. Unlock the full book to continue the adventure,
          view all remaining pages, and prepare the book for print.
        </div>
        <button class="unlock-full-btn" id="inlineUnlockBtn" type="button">
          Unlock Full Book - $49
        </button>
        <div class="unlock-note">
          This will move you to checkout. Payment integration comes next.
        </div>
      `;
      previewGrid.appendChild(lockedCard);

      document.getElementById("inlineUnlockBtn").addEventListener("click", goToCheckout);
    }

    if (fullUnlocked) {
      prefetchAllImagesInBackground();
    }
  </script>
</body>
</html>
