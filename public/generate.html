<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Generating</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .generate-shell{
      width:min(1240px, 94vw);
      margin:0 auto;
      padding:24px 0 56px;
      position:relative;
      z-index:2;
    }

    .generate-layout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 420px;
      gap:20px;
      align-items:start;
    }

    .generate-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border:1px solid rgba(240,196,109,0.14);
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:28px;
    }

    .generate-card h1{
      margin:0 0 10px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:clamp(38px, 6vw, 64px);
      line-height:.96;
      color:#f9f1e4;
    }

    .generate-card p{
      margin:0 0 18px;
      color:#cfc0ab;
      font-size:18px;
      line-height:1.65;
      max-width:820px;
    }

    .step-list{
      display:grid;
      gap:14px;
      margin-top:22px;
    }

    .step-item{
      display:flex;
      align-items:flex-start;
      gap:12px;
      padding:16px 18px;
      border-radius:20px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:#d8c9b4;
    }

    .step-item.active{
      border-color:rgba(240,196,109,0.28);
      background:rgba(240,196,109,0.07);
    }

    .step-dot{
      width:28px;
      height:28px;
      border-radius:50%;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      background:rgba(255,255,255,0.08);
      color:#f7efdf;
      margin-top:1px;
    }

    .step-item.active .step-dot{
      background:linear-gradient(180deg, #f0c46d 0%, #d38f2e 100%);
      color:white;
    }

    .step-copy{
      font-size:16px;
      line-height:1.55;
    }

    .step-copy strong{
      display:block;
      font-size:18px;
      color:#fff5df;
      margin-bottom:2px;
    }

    .generate-side{
      display:grid;
      gap:18px;
      position:sticky;
      top:18px;
    }

    .preview-panel{
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:18px;
    }

    .preview-panel h3{
      margin:0 0 12px;
      font-family:Georgia, "Times New Roman", serif;
      font-size:24px;
      color:#f7efdf;
      line-height:1.1;
    }

    .preview-frame{
      width:100%;
      border-radius:20px;
      overflow:hidden;
      background:rgba(255,255,255,0.06);
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .preview-image{
      width:100%;
      display:block;
      object-fit:cover;
      min-height:220px;
      max-height:420px;
      background:rgba(255,255,255,0.06);
    }

    .generate-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .status-text{
      margin-top:16px;
      font-size:15px;
      line-height:1.55;
      color:#efc878;
      font-weight:700;
      min-height:24px;
    }

    .generate-actions .continue-btn,
    .generate-actions .secondary-btn{
      min-width:210px;
    }

    @media (max-width:1024px){
      .generate-layout{
        grid-template-columns:1fr;
      }

      .generate-side{
        position:static;
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:720px){
      .generate-shell{
        width:min(100%, 100vw);
        padding:16px 12px 42px;
        box-sizing:border-box;
      }

      .generate-card{
        padding:20px;
        border-radius:24px;
      }

      .generate-card h1{
        font-size:clamp(34px, 12vw, 50px);
        line-height:.95;
      }

      .generate-card p{
        font-size:16px;
        line-height:1.58;
        margin-bottom:16px;
      }

      .step-list{
        gap:12px;
        margin-top:18px;
      }

      .step-item{
        padding:14px;
        border-radius:18px;
      }

      .step-dot{
        width:30px;
        height:30px;
        font-size:15px;
      }

      .step-copy{
        font-size:15px;
      }

      .step-copy strong{
        font-size:17px;
      }

      .status-text{
        margin-top:14px;
        font-size:14px;
      }

      .generate-actions{
        flex-direction:column;
        gap:12px;
        margin-top:18px;
      }

      .generate-actions .continue-btn,
      .generate-actions .secondary-btn{
        width:100%;
        min-width:0;
      }

      .generate-side{
        grid-template-columns:1fr;
        gap:14px;
      }

      .preview-panel{
        padding:14px;
        border-radius:22px;
      }

      .preview-panel h3{
        font-size:22px;
        margin-bottom:10px;
      }

      .preview-frame{
        min-height:180px;
        border-radius:16px;
      }

      .preview-image{
        min-height:180px;
        max-height:320px;
        border-radius:16px;
      }
    }
  </style>
</head>
<body class="setup-body">
  <header class="wizard-topbar">
    <div class="wizard-topbar-left">
      <button class="back-link-button" id="backToCropBtn" type="button">← Back</button>
    </div>

    <div class="wizard-brand">
      <img class="brand-image" src="assets/logo.png" alt="Lifebook logo" />
    </div>

    <div class="wizard-topbar-right"></div>
  </header>

  <main class="generate-shell">
    <div class="generate-layout">
      <section class="generate-card">
        <div class="wizard-step-label">Step 3 of 5</div>
        <h1>Generating your book</h1>
        <p>
          Creating your child's personalized storybook. This takes about a minute.
        </p>

        <div class="step-list">

          <div class="step-item" id="stepStory">
            <div class="step-dot">2</div>
            <div class="step-copy">
              <strong>Build Story Structure</strong>
              Generate the title, subtitle, and all story pages.
            </div>
          </div>

          <div class="step-item" id="stepPreview">
            <div class="step-dot">3</div>
            <div class="step-copy">
              <strong>Prepare Preview</strong>
              Save everything for the cover and preview pages.
            </div>
          </div>
        </div>

        <div class="status-text" id="generateStatus">Ready to begin.</div>

        <div class="generate-actions">
          <button class="continue-btn" id="generateBookBtn" type="button">Generate Book</button>
          <button class="secondary-btn" id="backToSetupBtn" type="button">Back to Setup</button>
        </div>
      </section>

      <aside class="generate-side">
        <div class="preview-panel">
          <h3>Uploaded photo</h3>
          <div class="preview-frame">
            <img class="preview-image" id="uploadedPhotoPreview" alt="Uploaded child photo" />
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script type="module" src="./generate.js"></script>
</body>
</html>
