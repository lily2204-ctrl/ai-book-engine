<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifebook - Creating Your Story</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .generate-shell {
      width: min(860px, 94vw);
      margin: 0 auto;
      padding: 40px 0 60px;
      text-align: center;
    }

    .generate-card {
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      padding: 40px 28px;
      max-width: 760px;
      margin: 0 auto;
    }

    .generate-spinner-wrap {
      width: 120px;
      height: 120px;
      margin: 10px auto 28px;
      border-radius: 50%;
      background: #fff5df;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .generate-spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 6px solid #f3d8a0;
      border-top-color: #e4ab4b;
      animation: spin 1s linear infinite;
    }

    .generate-title {
      font-size: clamp(30px, 4vw, 48px);
      margin: 0 0 14px;
      line-height: 1.08;
    }

    .generate-subtitle {
      color: var(--muted);
      font-size: 20px;
      line-height: 1.55;
      margin: 0 auto 30px;
      max-width: 620px;
    }

    .generate-steps {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      text-align: left;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .generate-step {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: #faf7f0;
      border-radius: 18px;
      border: 1px solid #f1e2c4;
    }

    .generate-step-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d8d8d8;
      flex-shrink: 0;
    }

    .generate-step.active .generate-step-dot {
      background: #e4ab4b;
      box-shadow: 0 0 0 6px rgba(228,171,75,0.15);
    }

    .generate-step.done .generate-step-dot {
      background: #7bbd67;
      box-shadow: 0 0 0 6px rgba(123,189,103,0.14);
    }

    .generate-step-text {
      font-weight: 700;
    }

    .generate-error {
      margin-top: 24px;
      color: #c84b4b;
      font-weight: 700;
      min-height: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="setup-body">

  <div class="generate-shell">
    <div class="wizard-topbar">
      <div class="wizard-topbar-left"></div>

      <div class="wizard-brand">
        <div class="logo-mark small"></div>
        <span class="wizard-brand-text">lifebook</span>
      </div>

      <div class="wizard-topbar-right"></div>
    </div>

    <div class="wizard-step-label">STEP 3 OF 5</div>

    <div class="generate-card">
      <div class="generate-spinner-wrap">
        <div class="generate-spinner"></div>
      </div>

      <h1 class="generate-title">We’re building your book</h1>
      <p class="generate-subtitle">
        Our AI is preparing the character, the story structure, and the premium cover.
      </p>

      <div class="generate-steps">
        <div class="generate-step active" id="stepCharacter">
          <div class="generate-step-dot"></div>
          <div class="generate-step-text">Creating the child character reference</div>
        </div>

        <div class="generate-step" id="stepStory">
          <div class="generate-step-dot"></div>
          <div class="generate-step-text">Generating the title, subtitle, and story pages</div>
        </div>

        <div class="generate-step" id="stepCover">
          <div class="generate-step-dot"></div>
          <div class="generate-step-text">Preparing the premium cover preview</div>
        </div>
      </div>

      <div id="generateError" class="generate-error"></div>
    </div>
  </div>

  <script src="generate.js"></script>
</body>
</html>
