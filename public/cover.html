<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Book Cover</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .cover-shell {
      width: min(980px, 94vw);
      margin: 0 auto;
      padding: 26px 0 60px;
    }

    .cover-main-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.14);
      padding: 28px;
    }

    .cover-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      align-items: stretch;
    }

    .cover-preview {
      border-radius: 28px;
      background: linear-gradient(155deg, #fff4dc 0%, #f4e9d8 100%);
      min-height: 640px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .cover-preview::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.5), transparent 40%);
      pointer-events: none;
    }

    .cover-top-badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      color: #8d6b2b;
      font-size: 13px;
      font-weight: 700;
      width: fit-content;
      margin-bottom: 26px;
    }

    .cover-book-title {
      font-size: clamp(34px, 4vw, 54px);
      line-height: 1.02;
      margin: 0 0 16px;
      max-width: 520px;
    }

    .cover-book-subtitle {
      font-size: 20px;
      color: #6f6f6f;
      line-height: 1.55;
      margin: 0 0 24px;
      max-width: 520px;
    }

    .cover-hero-character {
      width: 260px;
      height: 260px;
      border-radius: 28px;
      object-fit: cover;
      margin-top: auto;
      box-shadow: 0 18px 35px rgba(0,0,0,0.18);
      background: white;
    }

    .cover-side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cover-info-box {
      background: #faf7f0;
      border: 1px solid #f0e5d2;
      border-radius: 24px;
      padding: 22px;
    }

    .cover-info-box h3 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .cover-meta-line {
      margin-bottom: 12px;
      color: #666;
      line-height: 1.5;
      font-size: 15px;
    }

    .cover-action-card {
      background: white;
      border: 1px solid #ececec;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.06);
    }

    .cover-action-title {
      font-size: 24px;
      margin: 0 0 12px;
    }

    .cover-action-text {
      color: #6d6d6d;
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .unlock-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #e4ab4b;
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 24px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .unlock-btn:hover {
      background: #cf9432;
    }

    .cover-note {
      margin-top: 14px;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .cover-layout {
        grid-template-columns: 1fr;
      }

      .cover-preview {
        min-height: 520px;
      }
    }
  </style>
</head>
<body class="setup-body">

  <div class="cover-shell">
    <header class="wizard-topbar">
      <div class="wizard-topbar-left">
        <button class="back-link-button" id="backToSetup" type="button">← Back</button>
      </div>

      <div class="wizard-brand">
        <div class="logo-mark small"></div>
        <span class="wizard-brand-text">lifebook</span>
      </div>

      <div class="wizard-topbar-right"></div>
    </header>

    <div class="cover-main-card">
      <div class="cover-layout">

        <div class="cover-preview">
          <div class="cover-top-badge">Premium Story Preview</div>
          <h1 class="cover-book-title" id="coverBookTitle">Your Story Title</h1>
          <p class="cover-book-subtitle" id="coverBookSubtitle">Your story subtitle will appear here.</p>
          <img id="coverCharacterImage" class="cover-hero-character" alt="Main character preview" />
        </div>

        <div class="cover-side-panel">
          <div class="cover-info-box">
            <h3>Book details</h3>
            <div class="cover-meta-line"><strong>Child:</strong> <span id="metaChildName"></span></div>
            <div class="cover-meta-line"><strong>Age:</strong> <span id="metaChildAge"></span></div>
            <div class="cover-meta-line"><strong>Style:</strong> <span id="metaStyle"></span></div>
            <div class="cover-meta-line"><strong>Story idea:</strong> <span id="metaStoryIdea"></span></div>
          </div>

          <div class="cover-action-card">
            <h3 class="cover-action-title">Unlock your preview</h3>
            <div class="cover-action-text">
              Open the preview version of the book and continue to the next stage.
            </div>

            <button class="unlock-btn" id="unlockPreviewBtn" type="button">
              Open Book Preview
            </button>

            <div class="cover-note">
              Payment and print-ready export will be connected in the next stage.
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const rawBookData = localStorage.getItem("bookData");

    if (!rawBookData) {
      window.location.href = "setup.html";
    }

    const bookData = JSON.parse(rawBookData);

    document.getElementById("coverBookTitle").textContent =
      bookData.title || "Your magical story";

    document.getElementById("coverBookSubtitle").textContent =
      bookData.subtitle || "A personalized adventure made just for your child.";

    document.getElementById("metaChildName").textContent =
      bookData.childName || "-";

    document.getElementById("metaChildAge").textContent =
      bookData.childAge || "-";

    document.getElementById("metaStyle").textContent =
      bookData.illustration_style || "-";

    document.getElementById("metaStoryIdea").textContent =
      bookData.storyIdea || "-";

    const characterImage = document.getElementById("coverCharacterImage");

    if (bookData.characterImageBase64) {
      characterImage.src = `data:image/png;base64,${bookData.characterImageBase64}`;
    } else if (localStorage.getItem("croppedPhoto")) {
      characterImage.src = localStorage.getItem("croppedPhoto");
    }

    document.getElementById("backToSetup").addEventListener("click", () => {
      window.location.href = "setup.html";
    });

    document.getElementById("unlockPreviewBtn").addEventListener("click", () => {
      localStorage.setItem("paid", "true");
      window.location.href = "preview.html";
    });
  </script>
</body>
</html>
