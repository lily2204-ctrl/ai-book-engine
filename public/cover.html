<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifebook - Book Cover</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(27, 46, 94, 0.55) 0%, rgba(10, 16, 34, 0.96) 55%, rgba(5, 10, 20, 1) 100%),
        url("assets/backgrounds/FE0410D4-7381-4ACC-8FB9-D8862D553EC0.PNG");
      background-size: cover;
      background-position: center;
      color: #fff8ec;
      min-height: 100vh;
    }

    .cover-shell {
      width: min(1220px, 94vw);
      margin: 0 auto;
      padding: 28px 0 60px;
      position: relative;
      z-index: 2;
    }

    .cover-topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 26px;
    }

    .cover-back-btn {
      justify-self: start;
      appearance: none;
      border: 1px solid rgba(240, 196, 109, 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: #fff7ea;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .cover-brand {
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cover-brand img {
      height: 64px;
      width: auto;
      display: block;
    }

    .cover-brand-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      color: #f7ecd7;
      letter-spacing: 0.4px;
    }

    .cover-layout {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 28px;
      align-items: stretch;
    }

    .cover-card,
    .cover-info-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border: 1px solid rgba(240,196,109,0.14);
      border-radius: 34px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.34);
    }

    .cover-card {
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 720px;
    }

    .book-cover-stage {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      position: relative;
    }

    .book-shadow {
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      width: 88%;
      height: 32px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
      filter: blur(14px);
      z-index: 0;
    }

    .book-cover {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 0.72 / 1;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(234, 190, 94, 0.5);
      box-shadow:
        0 18px 38px rgba(0,0,0,0.34),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #10182d 0%, #0b1222 100%);
    }

    .book-cover-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 1;
    }

    .cover-frame {
      position: absolute;
      inset: 16px;
      border: 1.5px solid rgba(243, 203, 121, 0.5);
      border-radius: 14px;
      pointer-events: none;
      z-index: 3;
    }

    .cover-info-card {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 720px;
    }

    .cover-step-label {
      color: #e9c57c;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .cover-heading {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(40px, 5vw, 66px);
      line-height: 0.95;
      color: #fff7e8;
    }

    .cover-copy {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: #d7c8b3;
      max-width: 680px;
    }

    .cover-meta {
      display: grid;
      gap: 14px;
      margin-top: 6px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      align-items: start;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,196,109,0.12);
    }

    .meta-label {
      font-size: 15px;
      font-weight: 700;
      color: #e9c57c;
    }

    .meta-value {
      font-size: 16px;
      line-height: 1.5;
      color: #fff6e6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cover-actions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .primary-btn,
    .secondary-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .cover-back-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      background: linear-gradient(180deg, #f0c46d 0%, #d08e2b 100%);
      color: #fffaf1;
      box-shadow: 0 10px 24px rgba(208, 142, 43, 0.28);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.05);
      color: #fff8ec;
      border: 1px solid rgba(240,196,109,0.16);
    }

    @media (max-width: 980px) {
      .cover-layout {
        grid-template-columns: 1fr;
      }

      .cover-card,
      .cover-info-card {
        min-height: auto;
      }

      .meta-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .cover-topbar {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .cover-back-btn,
      .cover-brand {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="cover-shell">
    <header class="cover-topbar">
      <button id="backToGenerateBtn" class="cover-back-btn" type="button">← Back</button>

      <div class="cover-brand">
        <img id="brandLogoTop" src="assets/branding/6C38A8F4-9FC1-434F-BB73-4933001086FB.PNG" alt="Lifebook logo" />
        <span class="cover-brand-text">lifebook</span>
      </div>

      <div></div>
    </header>

    <section class="cover-layout">
      <div class="cover-card">
        <div class="book-cover-stage">
          <div class="book-shadow"></div>

          <div class="book-cover">
            <img id="coverFillImage" class="book-cover-fill" alt="Book cover art" />
            <div class="cover-frame"></div>
          </div>
        </div>
      </div>

      <div class="cover-info-card">
        <div class="cover-step-label">Step 4 of 5</div>
        <h2 class="cover-heading">Your cover is ready</h2>
        <p class="cover-copy">
          We prepared the title, subtitle, and lead visual for your personalized book. Review the setup and continue to the full preview.
        </p>

        <div class="cover-meta">
          <div class="meta-row">
            <div class="meta-label">Child name</div>
            <div id="metaChildName" class="meta-value">-</div>
          </div>

          <div class="meta-row">
            <div class="meta-label">Age</div>
            <div id="metaAge" class="meta-value">-</div>
          </div>

          <div class="meta-row">
            <div class="meta-label">Illustration style</div>
            <div id="metaStyle" class="meta-value">-</div>
          </div>

          <div class="meta-row">
            <div class="meta-label">Story direction</div>
            <div id="metaStory" class="meta-value">-</div>
          </div>

          <div class="meta-row">
            <div class="meta-label">Pages prepared</div>
            <div id="metaPages" class="meta-value">-</div>
          </div>
        </div>

        <div class="cover-actions">
          <button id="continueToPreviewBtn" class="primary-btn" type="button">Continue to preview</button>
          <button id="restartBookBtn" class="secondary-btn" type="button">Start over</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./cover.js"></script>
</body>
</html>
