<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifebook - Reader View</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(27, 46, 94, 0.55) 0%, rgba(10, 16, 34, 0.96) 55%, rgba(5, 10, 20, 1) 100%),
        url("assets/backgrounds/stars-bg.jpg");
      background-size: cover;
      background-position: center;
      color: #fff8ec;
      min-height: 100vh;
    }

    .reader-shell {
      width: min(980px, 94vw);
      margin: 0 auto;
      padding: 28px 0 80px;
      position: relative;
      z-index: 2;
    }

    .reader-topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-bottom: 26px;
    }

    .reader-back-btn {
      justify-self: start;
      appearance: none;
      border: 1px solid rgba(240, 196, 109, 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: #fff7ea;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .reader-brand {
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reader-brand img {
      height: 44px;
      width: auto;
      display: block;
    }

    .reader-brand-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      color: #f7ecd7;
    }

    .reader-book-card,
    .reader-page-card,
    .reader-nav-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(18,23,41,0.96), rgba(14,18,33,0.98));
      border: 1px solid rgba(240,196,109,0.14);
      border-radius: 34px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.34);
    }

    .reader-book-card {
      padding: 24px;
      margin-bottom: 22px;
    }

    .reader-step {
      color: #e9c57c;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .reader-title {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(40px, 5vw, 64px);
      line-height: 0.95;
      color: #fff7e8;
      white-space: pre-line;
    }

    .reader-subtitle {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
      color: #d7c8b3;
    }

    .reader-page-card {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .reader-image-wrap {
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(240,196,109,0.16);
      background: rgba(255,255,255,0.04);
      min-height: 420px;
    }

    .reader-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    .reader-image-loading,
    .reader-image-error {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: 16px;
      line-height: 1.6;
    }

    .reader-image-loading {
      color: #d4c3ab;
    }

    .reader-image-error {
      color: #f3b5a5;
    }

    .reader-page-badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(240,196,109,0.08);
      border: 1px solid rgba(240,196,109,0.16);
      color: #efc977;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .reader-page-text {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 2.2vw, 34px);
      line-height: 1.45;
      color: #fff7eb;
      white-space: pre-wrap;
    }

    .reader-nav-card {
      margin-top: 22px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .reader-nav-left {
      color: #d8c9b4;
      font-size: 16px;
      line-height: 1.5;
    }

    .reader-nav-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .reader-back-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      background: linear-gradient(180deg, #f0c46d 0%, #d08e2b 100%);
      color: #fffaf1;
      box-shadow: 0 10px 24px rgba(208, 142, 43, 0.28);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.05);
      color: #fff8ec;
      border: 1px solid rgba(240,196,109,0.16);
    }
  </style>
</head>
<body>
  <div class="reader-shell">
    <header class="reader-topbar">
      <button id="backToPreviewBtn" class="reader-back-btn" type="button">← Back</button>

      <div class="reader-brand">
        <img id="readerBrandLogo" src="assets/branding/logo.png" alt="Lifebook logo" />
        <span class="reader-brand-text">lifebook</span>
      </div>

      <div></div>
    </header>

    <section class="reader-book-card">
      <div class="reader-step">Reader view</div>
      <h1 id="readerTitle" class="reader-title">Your Magical Adventure</h1>
      <p id="readerSubtitle" class="reader-subtitle">A story where you are the hero</p>
    </section>

    <section class="reader-page-card">
      <div class="reader-page-badge" id="readerPageBadge">Page 1</div>

      <div class="reader-image-wrap" id="readerImageWrap">
        <div class="reader-image-loading">Preparing page illustration...</div>
      </div>

      <p id="readerPageText" class="reader-page-text"></p>
    </section>

    <section class="reader-nav-card">
      <div class="reader-nav-left">
        <span id="readerPageCounter">Page 1 of 10</span>
      </div>

      <div class="reader-nav-actions">
        <button id="prevPageBtn" class="secondary-btn" type="button">Previous</button>
        <button id="nextPageBtn" class="primary-btn" type="button">Next</button>
      </div>
    </section>
  </div>

  <script type="module" src="./reader.js"></script>
</body>
</html>
