<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lifebook - Print Ready</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    body.print-body {
      background: #f3f3f3;
    }

    .print-shell {
      width: min(1100px, 96vw);
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .print-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .print-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .print-btn {
      border: none;
      border-radius: 999px;
      background: #e4ab4b;
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 22px;
      cursor: pointer;
    }

    .print-btn.secondary {
      background: white;
      color: #333;
      border: 1px solid #ddd;
    }

    .print-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .print-book {
      display: grid;
      gap: 22px;
    }

    .print-status {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #fff8eb;
      border: 1px solid #f1dfbc;
      color: #8d6b2b;
      font-weight: 700;
      display: none;
    }

    .print-cover,
    .print-page {
      background: white;
      border-radius: 28px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.1);
      padding: 28px;
      page-break-inside: avoid;
    }

    .print-cover {
      background: linear-gradient(155deg, #fff4dc 0%, #f4e9d8 100%);
      min-height: 720px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .print-cover-badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      color: #8d6b2b;
      font-size: 13px;
      font-weight: 700;
      width: fit-content;
    }

    .print-cover-title {
      font-size: clamp(38px, 5vw, 60px);
      line-height: 1.02;
      margin: 22px 0 14px;
    }

    .print-cover-subtitle {
      font-size: 22px;
      color: #6f6f6f;
      line-height: 1.55;
      margin: 0 0 24px;
      max-width: 620px;
    }

    .print-cover-image {
      width: 280px;
      height: 280px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: 0 18px 35px rgba(0,0,0,0.18);
      background: white;
      display: block;
    }

    .print-page-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .print-page-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 24px;
      background: #f7f0e4;
      border: 1px solid #efe2cc;
      display: block;
    }

    .print-page-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9a8458;
      font-weight: 700;
      padding: 20px;
      text-align: center;
    }

    .print-page-number {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b48b42;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .print-page-text {
      font-size: 24px;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .print-page-layout {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body.print-body {
        background: white;
      }

      .print-topbar,
      .print-status {
        display: none !important;
      }

      .print-cover,
      .print-page {
        box-shadow: none;
        border-radius: 0;
      }

      .print-shell {
        width: 100%;
        max-width: 100%;
        padding: 0;
      }
    }
  </style>
</head>
<body class="print-body">

  <div class="print-shell">
    <div class="print-topbar">
      <div class="wizard-brand">
        <div class="logo-mark small"></div>
        <span class="wizard-brand-text">lifebook</span>
      </div>

      <div class="print-actions">
        <button class="print-btn secondary" id="backToDeliveryBtn" type="button">← Back</button>
        <button class="print-btn secondary" id="downloadPdfBtn" type="button">Download PDF</button>
        <button class="print-btn" id="printBookBtn" type="button">Print This Book</button>
      </div>
    </div>

    <div class="print-status" id="printStatus"></div>
    <div class="print-book" id="printBook"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const DB_NAME = "lifebookDB";
    const STORE_NAME = "images";

    const rawBookData = localStorage.getItem("bookData");
    const paid = localStorage.getItem("paid") === "true";

    if (!rawBookData || !paid) {
      window.location.href = "preview.html";
    }

    const bookData = JSON.parse(rawBookData);
    const printBook = document.getElementById("printBook");
    const printStatus = document.getElementById("printStatus");
    const downloadPdfBtn = document.getElementById("downloadPdfBtn");
    const printBookBtn = document.getElementById("printBookBtn");

    function setStatus(message = "", visible = false) {
      printStatus.textContent = message;
      printStatus.style.display = visible ? "block" : "none";
    }

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = function () {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error || new Error("Failed to open IndexedDB"));
        };
      });
    }

    async function getImageFromDB(key) {
      const db = await openDatabase();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(key);

        req.onsuccess = function () {
          resolve(req.result || null);
        };

        req.onerror = function () {
          reject(req.error || new Error("Failed to read image from DB"));
        };
      });
    }

    async function saveImageToDB(key, value) {
      const db = await openDatabase();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        const req = store.put(value, key);

        req.onsuccess = function () {
          resolve(true);
        };

        req.onerror = function () {
          reject(req.error || new Error("Failed to save image to DB"));
        };
      });
    }

    function pageImageKey(pageIndex) {
      return `pageImage_${pageIndex}`;
    }

    function getCoverImageSrc() {
      if (bookData.characterImageBase64) {
        return `data:image/png;base64,${bookData.characterImageBase64}`;
      }
      if (bookData.croppedPhoto) {
        return bookData.croppedPhoto;
      }
      if (localStorage.getItem("croppedPhoto")) {
        return localStorage.getItem("croppedPhoto");
      }
      return "";
    }

    async function getPageImageSrc(pageIndex) {
      const fromDb = await getImageFromDB(pageImageKey(pageIndex));
      if (fromDb) {
        return `data:image/png;base64,${fromDb}`;
      }
      return "";
    }

    async function requestPageImageWithRetry(pageIndex, maxAttempts = 3) {
      const existing = await getImageFromDB(pageImageKey(pageIndex));
      if (existing) return existing;

      const page = bookData.pages?.[pageIndex];
      if (!page) {
        throw new Error(`Missing page ${pageIndex + 1}`);
      }

      const prompt = page.imagePrompt || "";
      if (!prompt) {
        throw new Error(`Missing image prompt for page ${pageIndex + 1}`);
      }

      let lastError = null;

      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          const res = await fetch(`${API_BASE}/generate-image`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt,
              illustration_style: bookData.illustration_style || "Soft Storybook",
              characterDescription: bookData.characterDescription,
              characterDNA: bookData.characterDNA
            })
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data?.details || data?.message || "Image generation failed");
          }

          if (!data?.imageBase64) {
            throw new Error(`No image returned for page ${pageIndex + 1}`);
          }

          await saveImageToDB(pageImageKey(pageIndex), data.imageBase64);
          return data.imageBase64;
        } catch (error) {
          lastError = error;
          if (attempt < maxAttempts) {
            await new Promise((resolve) => setTimeout(resolve, 900));
          }
        }
      }

      throw lastError || new Error("Image generation failed");
    }

    async function createCover() {
      const cover = document.createElement("div");
      cover.className = "print-cover";

      const coverImage = getCoverImageSrc();

      cover.innerHTML = `
        <div>
          <div class="print-cover-badge">Print Ready Edition</div>
          <h1 class="print-cover-title">${bookData.title || "Your magical story"}</h1>
          <div class="print-cover-subtitle">${bookData.subtitle || "A personalized adventure made just for your child."}</div>
        </div>

        <div>
          ${
            coverImage
              ? `<img class="print-cover-image" src="${coverImage}" alt="Book cover image" />`
              : `<div class="print-cover-image print-page-image placeholder">Cover image</div>`
          }
        </div>
      `;

      return cover;
    }

    async function createPage(page, index) {
      const pageCard = document.createElement("div");
      pageCard.className = "print-page";

      const imageSrc = await getPageImageSrc(index);

      pageCard.innerHTML = `
        <div class="print-page-layout">
          <div>
            ${
              imageSrc
                ? `<img class="print-page-image" src="${imageSrc}" alt="Page illustration" />`
                : `<div class="print-page-image placeholder">Illustration will appear here</div>`
            }
          </div>

          <div>
            <div class="print-page-number">Page ${index + 1}</div>
            <div class="print-page-text">${page?.text || ""}</div>
          </div>
        </div>
      `;

      return pageCard;
    }

    async function renderBook() {
      printBook.innerHTML = "";
      printBook.appendChild(await createCover());

      const pages = Array.isArray(bookData.pages) ? bookData.pages : [];
      for (let i = 0; i < pages.length; i++) {
        printBook.appendChild(await createPage(pages[i], i));
      }
    }

    async function ensureAllPageImages() {
      const pages = Array.isArray(bookData.pages) ? bookData.pages : [];

      for (let i = 0; i < pages.length; i++) {
        const existing = await getImageFromDB(pageImageKey(i));
        if (!existing) {
          setStatus(`Preparing illustration ${i + 1} of ${pages.length}...`, true);
          await requestPageImageWithRetry(i, 3);
        }
      }

      setStatus("", false);
    }

    function addImageSafe(pdf, imageDataUrl, format, x, y, w, h) {
      try {
        pdf.addImage(imageDataUrl, format, x, y, w, h);
        return true;
      } catch (error) {
        return false;
      }
    }

    function addAnyImage(pdf, imageDataUrl, x, y, w, h) {
      if (!imageDataUrl) return false;
      return (
        addImageSafe(pdf, imageDataUrl, "JPEG", x, y, w, h) ||
        addImageSafe(pdf, imageDataUrl, "PNG", x, y, w, h) ||
        addImageSafe(pdf, imageDataUrl, "WEBP", x, y, w, h)
      );
    }

    async function buildPdfDirectly() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");

      const pageWidth = 210;
      const pageHeight = 297;
      const margin = 15;

      pdf.setFillColor(255, 244, 220);
      pdf.rect(0, 0, pageWidth, pageHeight, "F");

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(12);
      pdf.setTextColor(141, 107, 43);
      pdf.text("Print Ready Edition", margin, 20);

      pdf.setFontSize(24);
      pdf.setTextColor(25, 25, 25);
      const coverTitle = pdf.splitTextToSize(bookData.title || "Your magical story", 120);
      pdf.text(coverTitle, margin, 40);

      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(14);
      pdf.setTextColor(100, 100, 100);
      const coverSubtitle = pdf.splitTextToSize(
        bookData.subtitle || "A personalized adventure made just for your child.",
        120
      );
      pdf.text(coverSubtitle, margin, 70);

      const coverImage = getCoverImageSrc();
      addAnyImage(pdf, coverImage, 55, 140, 100, 100);

      const pages = Array.isArray(bookData.pages) ? bookData.pages : [];

      for (let i = 0; i < pages.length; i++) {
        pdf.addPage();

        pdf.setFillColor(255, 255, 255);
        pdf.rect(0, 0, pageWidth, pageHeight, "F");

        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(11);
        pdf.setTextColor(180, 139, 66);
        pdf.text(`PAGE ${i + 1}`, margin, 18);

        const imageBase64 = await getImageFromDB(pageImageKey(i));
        if (imageBase64) {
          addAnyImage(pdf, `data:image/png;base64,${imageBase64}`, margin, 28, 80, 80);
        }

        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(16);
        pdf.setTextColor(35, 35, 35);

        const textLines = pdf.splitTextToSize(pages[i]?.text || "", 85);
        pdf.text(textLines, 105, 40);
      }

      const safeTitle = (bookData.title || "lifebook-story")
        .replace(/[^a-z0-9]/gi, "_")
        .toLowerCase();

      pdf.save(`${safeTitle}.pdf`);
    }

    async function initializePrintView() {
      try {
        await renderBook();
        await ensureAllPageImages();
        await renderBook();
      } catch (error) {
        console.error("Failed to prepare print view:", error);
        setStatus(error?.message || "Failed to prepare print view.", true);
      }
    }

    document.getElementById("backToDeliveryBtn").addEventListener("click", () => {
      window.location.href = "delivery.html";
    });

    printBookBtn.addEventListener("click", async () => {
      try {
        printBookBtn.disabled = true;
        setStatus("Preparing all pages for printing...", true);
        await ensureAllPageImages();
        await renderBook();
        setStatus("", false);
        window.print();
      } catch (error) {
        console.error(error);
        setStatus(error?.message || "Failed to prepare the book for printing. Please try again.", true);
      } finally {
        printBookBtn.disabled = false;
      }
    });

    downloadPdfBtn.addEventListener("click", async () => {
      try {
        downloadPdfBtn.disabled = true;
        downloadPdfBtn.textContent = "Preparing PDF...";
        setStatus("Preparing all illustrations for PDF...", true);

        await ensureAllPageImages();
        await renderBook();

        setStatus("Building downloadable PDF...", true);
        await buildPdfDirectly();

        setStatus("", false);
      } catch (error) {
        console.error("PDF generation failed:", error);
        setStatus(error?.message || "Failed to generate PDF. Please try again.", true);
      } finally {
        downloadPdfBtn.disabled = false;
        downloadPdfBtn.textContent = "Download PDF";
      }
    });

    initializePrintView();
  </script>
</body>
</html>
